repos:
-   repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-use-type-annotations
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: debug-statements
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff-check
        args:
          - --fix
          - --unsafe-fixes
          - --exit-non-zero-on-fix
        types_or:
          - python
          - pyi
          - jupyter
      - id: ruff-format
        types_or:
          - python
          - pyi
          - jupyter
-   repo: https://github.com/kynan/nbstripout
    rev: 0.9.0
    hooks:
    -   id: nbstripout
-   repo: local
    hooks:
    -   id: ty-check
        name: Ty (type checking)
        language: python
        entry: uv run ty check src/danglish
        pass_filenames: false
-   repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
    -   id: markdownlint-cli2
        args:
          - --fix
-   repo: local
    hooks:
    -   id: frontend-check
        name: Frontend type check and lint
        language: system
        entry: npm run check
        pass_filenames: false
