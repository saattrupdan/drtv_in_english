name: but_with_subs

services:
  proxy:
    image: nginx:alpine
    ports:
      - 80:80
    volumes:
      - ./docker-compose.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  model-cache-init:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      HF_HOME: /opt/hf-cache
    volumes:
      - model_cache:/opt/hf-cache
    command:
      - python
      - -c
      - |
        from transformers import pipeline
        from punctfix.inference import PunctFixer
        from but_with_subs.constants import ASR_MODEL_ID
        pipeline(task='automatic-speech-recognition', model=ASR_MODEL_ID, device='cpu', num_beams=5)
        PunctFixer(language='da')
    restart: "no"

  backend:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://but_with_subs:but_with_subs@postgres:5432/but_with_subs
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    volumes:
      - backend_data:/project/data
      - model_cache:/opt/hf-cache
    depends_on:
      postgres:
        condition: service_healthy
      model-cache-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5m
      start_interval: 5s

  frontend:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:18.3-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: but_with_subs
      POSTGRES_PASSWORD: but_with_subs
      POSTGRES_DB: but_with_subs
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U but_with_subs -d but_with_subs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  backend_data:
  model_cache:
