name: drtv-in-english

services:
  proxy:
    image: nginx:alpine
    ports:
      - 80:80
    volumes:
      - ./docker-compose.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  backend:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s

  frontend:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
